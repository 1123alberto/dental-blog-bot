name: Weekly Dental Blog Bot

on:
  schedule:
    - cron: '0 7 * * 1'  # 7:00 AM UTC every Monday (approx 9:00 AM Greece time)
  workflow_dispatch:     # Allows manual triggering from the Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Bot Repository
        uses: actions/checkout@v4
        with:
          path: bot # Checkout bot code into './bot' folder

      - name: Checkout Website Repository
        uses: actions/checkout@v4
        with:
          repository: '1123alberto/dentplant-new'
          token: ${{ secrets.WEBSITE_PUSH_PAT }} # Secure token to write to dentplant-new
          path: website # Checkout website code into './website' folder
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: bot/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bot/requirements.txt

      - name: Run Dental Blog Bot
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          WEBSITE_PATH: "./website" # Save outputs to the website checkout folder
        run: python bot/main.py

      - name: Commit and Push Changes to Website
        run: |
          cd website
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated: New weekly dental blog post" || echo "No changes to commit"
          git push origin master
